<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/favicon.svg" type="image/svg+xml">
<title>博客管理后台</title>
<style>
:root{--accent:#e07b58;--glass-bg:rgba(255,255,255,0.07);--glass-border:rgba(255,255,255,0.13);--text:#f0ede8;--muted:rgba(240,237,232,0.55)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;color:var(--text);line-height:1.7;min-height:100vh;background:linear-gradient(135deg,#0f0c29 0%,#1e1b4b 40%,#2d1b69 70%,#1a0533 100%)}
.container{max-width:1400px;margin:0 auto;padding:2rem}
h1{font-size:2rem;margin-bottom:2rem;text-align:center}
.auth-section{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:16px;padding:2rem;margin-bottom:2rem}
.auth-section.hidden{display:none}
.editor-section{display:none}
.editor-section.active{display:block}
.form-group{margin-bottom:1.5rem}
.form-group label{display:block;margin-bottom:0.5rem;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.75rem;background:rgba(255,255,255,0.1);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);font-family:inherit;font-size:1rem}
.form-group textarea{min-height:400px;font-family:'Courier New',monospace}
.btn{background:var(--accent);color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:600;transition:background 0.2s}
.btn:hover{background:#f5a623}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.preview{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:16px;padding:2rem;margin-top:2rem;max-height:600px;overflow-y:auto}
.status{padding:1rem;border-radius:8px;margin-bottom:1rem}
.status.success{background:rgba(34,197,94,0.2);border:1px solid rgba(34,197,94,0.4)}
.status.error{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4)}
.header-left{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;flex-shrink:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
@media (max-width:968px){.grid{grid-template-columns:1fr}}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem}
.stat-item{text-align:center;padding:1rem;background:rgba(255,255,255,0.05);border-radius:10px}
.stat-value{font-size:1.5rem;font-weight:700;color:var(--accent);font-family:monospace}
.stat-label{font-size:0.75rem;color:var(--muted);margin-top:0.3rem}
.stats-widget canvas{width:100%;height:auto;border-radius:8px;background:rgba(0,0,0,0.2)}
.stats-section{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:16px;padding:2rem;margin-bottom:2rem}
.articles-list{max-height:400px;overflow-y:auto;margin-top:1rem}
.article-row{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.article-row:hover{background:rgba(255,255,255,0.05)}
.article-title{flex:1;margin-right:1rem;font-size:0.9rem}
.article-views{color:var(--accent);font-family:monospace}
</style>
</head>
<body>
<div class="container">
<h1>📝 博客管理后台</h1>
<div id="status"></div>

<div class="auth-section" id="authSection">
<h2>GitHub 认证</h2>
<p style="color:var(--muted);margin:1rem 0">首次使用需要配置 GitHub Personal Access Token</p>
<div class="form-group">
<label>GitHub Token</label>
<input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
<small style="color:var(--muted)">
<a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" style="color:var(--accent)">点击创建 Token</a> (需要 repo 权限)
</small>
</div>
<button class="btn" onclick="saveToken()">保存并继续</button>
</div>

<div class="editor-section" id="editorSection">
<div class="stats-section">
<h2>📊 访问统计</h2>
<div class="stats-grid">
<div class="stat-item"><div class="stat-value" id="stats-total">--</div><div class="stat-label">总访问量</div></div>
<div class="stat-item"><div class="stat-value" id="stats-today">--</div><div class="stat-label">今日访问</div></div>
<div class="stat-item"><div class="stat-value" id="stats-week">--</div><div class="stat-label">本周访问</div></div>
</div>
<canvas id="stats-chart" width="600" height="200"></canvas>
<h3 style="margin-top:1.5rem;margin-bottom:1rem">📄 文章阅读量排行</h3>
<div class="articles-list" id="articles-list"></div>
</div>
<div style="background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:12px;padding:1.5rem;margin-bottom:2rem">
<h3 style="margin-bottom:1rem">编辑已有文章</h3>
<div class="header-left">
<input type="text" id="editFileName" placeholder="输入文章文件名，如: post-1778289950516.html" style="flex:1;padding:0.75rem;background:rgba(255,255,255,0.1);border:1px solid var(--glass-border);border-radius:8px;color:var(--text)">
<button class="btn" onclick="loadArticle()">加载文章</button>
</div>
</div>
<div class="grid">
<div>
<h2>编写文章</h2>
<div class="form-group">
<label>文章标题</label>
<input type="text" id="postTitle" placeholder="输入文章标题">
</div>
<div class="form-group">
<label>标签</label>
<select id="postTag">
<option value="技术">技术</option>
<option value="网络安全">网络安全</option>
<option value="前端">前端</option>
<option value="随笔">随笔</option>
<option value="安全">安全</option>
</select>
</div>
<div class="form-group">
<label>文章内容 (Markdown)</label>
<textarea id="postContent" placeholder="使用 Markdown 格式编写..."></textarea>
</div>
<button class="btn" onclick="publishPost()" id="publishBtn">发布文章</button>
</div>
<div>
<h2>预览</h2>
<div class="preview" id="preview">
<p style="color:var(--muted)">在左侧编写内容后，点击预览按钮查看效果</p>
</div>
<button class="btn" onclick="previewPost()" style="margin-top:1rem">刷新预览</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="analytics.js"></script>
<script>
const GITHUB_OWNER='7abian';
const GITHUB_REPO='7abian.github.io';
const GITHUB_BRANCH='main';

window.onload=function(){
const token=sessionStorage.getItem('github_token');
if(token){
document.getElementById('githubToken').value=token;
}
const params=new URLSearchParams(window.location.search);
const editFile=params.get('edit');
if(editFile && token){
document.getElementById('editFileName').value=editFile;
document.getElementById('authSection').classList.add('hidden');
document.getElementById('editorSection').classList.add('active');
loadArticle();
loadAnalytics();
}
};

function saveToken(){
const token=document.getElementById('githubToken').value.trim();
if(!token){showStatus('请输入 GitHub Token','error');return}
sessionStorage.setItem('github_token',token);
document.getElementById('authSection').classList.add('hidden');
document.getElementById('editorSection').classList.add('active');
showStatus('Token 已保存','success');
loadAnalytics();
}

function loadAnalytics(){
window.analytics = new Analytics();
window.analytics.init();
}

function previewPost(){
const content=document.getElementById('postContent').value;
const html=marked.parse(content);
document.getElementById('preview').innerHTML=html;
}

async function loadArticle(){
const fileName=document.getElementById('editFileName').value.trim();
if(!fileName){showStatus('请输入文章文件名','error');return}
try{
const token=sessionStorage.getItem('github_token');
const url=`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${fileName}`;
const resp=await fetch(url,{headers:{'Authorization':`token ${token}`}});
if(!resp.ok)throw new Error('文章不存在');
const data=await resp.json();
const html=decodeURIComponent(escape(atob(data.content)));
const titleMatch=html.match(/<h1>(.*?)<\/h1>/);
const tagMatch=html.match(/<div class="post-tag">(.*?)<\/div>/);
const contentMatch=html.match(/<div class="post-content">\s*([\s\S]*?)\s*<\/div>\s*(?:<nav|<div)/);
if(titleMatch)document.getElementById('postTitle').value=titleMatch[1];
if(tagMatch)document.getElementById('postTag').value=tagMatch[1];
if(contentMatch){
const htmlContent=contentMatch[1];
document.getElementById('postContent').value=htmlToMarkdown(htmlContent);
}
showStatus('文章加载成功','success');
}catch(error){
showStatus('加载失败: '+error.message,'error');
}
}

function htmlToMarkdown(html){
return html.replace(/<h2>(.*?)<\/h2>/g,'## $1\n')
.replace(/<h3>(.*?)<\/h3>/g,'### $1\n')
.replace(/<p>(.*?)<\/p>/g,'$1\n\n')
.replace(/<strong>(.*?)<\/strong>/g,'**$1**')
.replace(/<em>(.*?)<\/em>/g,'*$1*')
.replace(/<code>(.*?)<\/code>/g,'`$1`')
.replace(/<ul>/g,'').replace(/<\/ul>/g,'')
.replace(/<li>(.*?)<\/li>/g,'- $1\n')
.replace(/<[^>]+>/g,'').trim();
}

async function publishPost(){
const title=document.getElementById('postTitle').value.trim();
const tag=document.getElementById('postTag').value;
const content=document.getElementById('postContent').value.trim();
if(!title||!content){showStatus('请填写标题和内容','error');return}

const btn=document.getElementById('publishBtn');
btn.disabled=true;
const editFileName=document.getElementById('editFileName').value.trim();
const isEdit=!!editFileName;
btn.textContent=isEdit?'更新中...':'发布中...';

try{
const token=sessionStorage.getItem('github_token');
const fileName=isEdit?editFileName:`post-${Date.now()}.html`;
let nextPostFile=null,nextPostTitle=null,sha=null,existingNav=null;
if(!isEdit){
const idxUrl=`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/index.html`;
const idxResp=await fetch(idxUrl,{headers:{'Authorization':`token ${token}`}});
if(idxResp.ok){
const idxData=await idxResp.json();
const idxHTML=decodeURIComponent(escape(atob(idxData.content)));
const firstMatch=idxHTML.match(/<article onclick="location\.href='([^']+)'">[\s\S]*?<h2>(.*?)<\/h2>/);
if(firstMatch){nextPostFile=firstMatch[1];nextPostTitle=firstMatch[2];}
}
} else {
const url=`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${fileName}`;
const resp=await fetch(url,{headers:{'Authorization':`token ${token}`}});
if(resp.ok){const data=await resp.json();sha=data.sha;
const postHTML=decodeURIComponent(escape(atob(data.content)));
const navMatch=postHTML.match(/<nav class="post-nav"[^>]*>([\s\S]*?)<\/nav>/);
if(navMatch)existingNav=navMatch[0];
}
}
const html=generatePostHTML(title,tag,content,fileName,nextPostFile,nextPostTitle,existingNav);
await commitFile(fileName,html,isEdit?`Update post: ${title}`:`Add new post: ${title}`,sha);
if(!isEdit){
await updateIndexPage(fileName,title,tag,content);
if(nextPostFile)await updatePostPrevNav(nextPostFile,fileName,title);
}
showStatus(isEdit?'文章更新成功！':'文章发布成功！首页已自动更新','success');
document.getElementById('postTitle').value='';
document.getElementById('postContent').value='';
document.getElementById('editFileName').value='';
document.getElementById('preview').innerHTML='<p style="color:var(--muted)">预览区域</p>';
}catch(error){
showStatus((isEdit?'更新':'发布')+'失败: '+error.message,'error');
}finally{
btn.disabled=false;
btn.textContent='发布文章';
}
}

function generatePostHTML(title,tag,mdContent,fileName,nextPostFile,nextPostTitle,existingNav){
const htmlContent=marked.parse(mdContent);
const date=new Date().toISOString().split('T')[0];
  const pagePath = fileName.replace('.html', '');
  const prevLink = nextPostFile
  ? `<div class="placeholder"></div>`
  : `<div class="placeholder"></div>`;
  const nextLink = nextPostFile
  ? `<a href="${nextPostFile}" class="next-link">
  <span class="nav-label">下一篇 →</span>
  <span class="nav-title">${nextPostTitle}</span>
  </a>`
  : `<div class="placeholder"></div>`;
  return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="${title} — MRNOKK's Blog 技术文章">
<meta property="og:title" content="${title} · MRNOKK's Blog">
<meta property="og:description" content="${title} — 阅读技术文章，分享成长。">
<meta property="og:type" content="article">
<link rel="icon" href="images/favicon.svg" type="image/svg+xml">
<title>${title} · MRNOKK's Blog</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="progress-bar" id="progress" aria-hidden="true"></div>
<div class="bg-wrap" aria-hidden="true">
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>
</div>
<header>
<div class="nav-container">
<div class="header-left">
<a href="index.html" class="back-btn">← 返回首页</a>
<div class="admin-only">
<a href="admin.html?edit=${fileName}" class="back-btn">✏️ 编辑</a>
<a href="#" onclick="deletePost('${fileName}');return false" class="back-btn">🗑️ 删除</a>
</div>
</div>
<a href="index.html" class="logo">
<img src="images/avatar02.jpg" alt="MRNOKK" class="avatar">
<span>MRNOKK's Blog</span>
</a>
</div>
</header>
<div class="post-wrap">
<div class="post-hero">
<div class="post-tag">${tag}</div>
<h1>${title}</h1>
<div class="post-info">
<span>${date}</span>
<span>阅读约 5 分钟</span>
	<span id="article-views">阅读 -- 次</span>
</div>
</div>
<div class="post-content">
${htmlContent}
</div>
<nav class="post-nav" aria-label="文章导航">
${existingNav || prevLink+"\n"+nextLink}
</nav>
<div id="comment-section" data-blog-comments data-page-path="${pagePath}"></div>
</div>
<footer>
<p>&copy; 2026 MRNOKK's Blog. 用心记录，分享成长。</p>
</footer>
<script src="comments.js"><\/script>
<script src="utils.js"><\/script>
</body>
</html>`;
}

async function commitFile(path,content,message,sha){
const token=sessionStorage.getItem('github_token');
const url=`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
const body={message:message,content:btoa(unescape(encodeURIComponent(content))),branch:GITHUB_BRANCH};
if(sha)body.sha=sha;
const response=await fetch(url,{
method:'PUT',
headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
body:JSON.stringify(body)
});
if(!response.ok)throw new Error('GitHub API 请求失败');
return response.json();
}

async function updateIndexPage(fileName,title,tag,content){
const token=sessionStorage.getItem('github_token');
const url=`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/index.html`;
const getResp=await fetch(url,{headers:{'Authorization':`token ${token}`}});
if(!getResp.ok)throw new Error('无法读取 index.html');
const data=await getResp.json();
let indexHTML=decodeURIComponent(escape(atob(data.content)));
const date=new Date().toISOString().split('T')[0];
const excerpt=content.substring(0,100).replace(/[#*`\n]/g,'');
const newCard=`
    <article onclick="location.href='${fileName}'">
      <div class="post-meta">
        <span>${date}</span>
        <span class="tag">${tag}</span>
      </div>
      <h2>${title}</h2>
      <p>${excerpt}...</p>
      <a href="${fileName}" class="read-more">阅读更多 →</a>
    </article>`;
const insertPos=indexHTML.indexOf('<article onclick=');
if(insertPos===-1)throw new Error('无法找到文章插入位置');
indexHTML=indexHTML.substring(0,insertPos)+newCard+'\n\n'+indexHTML.substring(insertPos);
// 更新"近期文章"列表
const articlePattern=/<article onclick="location\.href='([^']+)'">[\s\S]*?<h2>(.*?)<\/h2>/g;
const articles=[];
let match;
while((match=articlePattern.exec(indexHTML))!==null){
articles.push({file:match[1],title:match[2]});
}
const recentArticles=articles.slice(0,4);
const recentListHTML=recentArticles.map(a=>`        <li><a href="${a.file}">${a.title}</a></li>`).join('\n');
const recentPattern=/(<div class="widget">\s*<h3>近期文章<\/h3>\s*<ul>)[\s\S]*?(<\/ul>\s*<\/div>)/;
if(recentPattern.test(indexHTML)){
indexHTML=indexHTML.replace(recentPattern,`$1\n${recentListHTML}\n      $2`);
}

const putResp=await fetch(url,{
method:'PUT',
headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
body:JSON.stringify({
message:`Update index: add ${title}`,
content:btoa(unescape(encodeURIComponent(indexHTML))),
sha:data.sha,
branch:GITHUB_BRANCH
})
});
if(!putResp.ok)throw new Error('无法更新 index.html');
}

async function updatePostPrevNav(postFile,prevFile,prevTitle){
const token=sessionStorage.getItem('github_token');
const url=`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${postFile}`;
const getResp=await fetch(url,{headers:{'Authorization':`token ${token}`}});
if(!getResp.ok)throw new Error('无法读取 '+postFile);
const data=await getResp.json();
let postHTML=decodeURIComponent(escape(atob(data.content)));
const prevLink=`<a href="${prevFile}">\n      <span class="nav-label">← 上一篇</span>\n      <span class="nav-title">${prevTitle}</span>\n    </a>`;
postHTML=postHTML.replace('<div class="placeholder"></div>',prevLink);
const putResp=await fetch(url,{
method:'PUT',
headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
body:JSON.stringify({
message:`Update nav: ${postFile} prev → ${prevFile}`,
content:btoa(unescape(encodeURIComponent(postHTML))),
sha:data.sha,
branch:GITHUB_BRANCH
})
});
if(!putResp.ok)throw new Error('无法更新 '+postFile);
}

function showStatus(message,type){
const statusDiv=document.getElementById('status');
statusDiv.innerHTML=`<div class="status ${type}">${message}</div>`;
setTimeout(()=>statusDiv.innerHTML='',8000);
}


</script>
</body>
</html>
